steps:
  # Build the container image with build args for Vite env vars
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_STEDI_API_KEY=$_VITE_STEDI_API_KEY'
      - '--build-arg'
      - 'VITE_SUNFIRE_API_URL=$_VITE_SUNFIRE_API_URL'
      - '--build-arg'
      - 'VITE_STEDI_MCP_URL=$_VITE_STEDI_MCP_URL'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tpp-employer-tool:$COMMIT_SHA'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tpp-employer-tool:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tpp-employer-tool'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tpp-employer-tool:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'gcr.io/$PROJECT_ID/tpp-employer-tool:$COMMIT_SHA'

substitutions:
  _VITE_STEDI_API_KEY: ''
  _VITE_SUNFIRE_API_URL: 'https://api-dot-tpp-staging-476110.uc.r.appspot.com/api'
  _VITE_STEDI_MCP_URL: 'https://mcp.us.stedi.com/2025-07-11/mcp'

options:
  logging: CLOUD_LOGGING_ONLY
